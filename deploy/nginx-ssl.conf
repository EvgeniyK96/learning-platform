# Вариант с HTTPS для домена codeway.kiri.kz.
# Используется вместо nginx.conf после получения сертификата (см. DEPLOY_HOSTVDS.md).

server {
    listen 80;
    server_name codeway.kiri.kz;

    # продление сертификата Let's Encrypt (webroot)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    http2 on;
    server_name codeway.kiri.kz;

    ssl_certificate /etc/letsencrypt/live/codeway.kiri.kz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/codeway.kiri.kz/privkey.pem;

    client_max_body_size 15m;

    location /static/ {
        alias /app/staticfiles/;
        expires 30d;
        add_header Cache-Control "public";
    }

    location /media/ {
        alias /app/media/;
        expires 7d;
    }

    location / {
        proxy_pass http://web:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
    }
}
