server {
    listen 80;
    server_name _;

    # лимит соответствует DATA_UPLOAD_MAX_MEMORY_SIZE (12 МБ) с небольшим запасом
    client_max_body_size 15m;

    location /static/ {
        alias /app/staticfiles/;
        # без длинного кеша: ES-модули (router.js и т.п.) импортируются без ?v=,
        # поэтому браузер должен ревалидировать их (ETag → 304, если не менялись).
        expires -1;
    }

    location /media/ {
        alias /app/media/;
        expires 7d;
    }

    location / {
        proxy_pass http://web:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
    }
}
